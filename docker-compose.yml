services:
  redis:
    image: redis:7-alpine
    container_name: autobank-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autobank-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET:-dev-only-change-me}
      - INSTANCE_PASSCODE=${INSTANCE_PASSCODE:-}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    profiles:
      # Default `docker compose up` brings only redis. Use `--profile app`
      # or `docker compose up app` to opt in to building the Next.js image
      # for full integration testing.
      - app
